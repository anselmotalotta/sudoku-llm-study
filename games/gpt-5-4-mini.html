<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jazz Grid</title>
  <style>
    :root{
      --bg:#0f1722;
      --panel:#162131;
      --panel2:#1c2a3d;
      --gold:#d8b15a;
      --gold2:#f0d78c;
      --cream:#f4ead6;
      --teal:#2a6f73;
      --teal2:#4aa3a6;
      --red:#e86b6b;
      --shadow: rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(74,163,166,.12), transparent 26%),
        radial-gradient(circle at 20% 20%, rgba(216,177,90,.10), transparent 18%),
        linear-gradient(180deg, #111a28, #0b121b 70%, #091018);
      color:var(--cream);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px;
      overflow-x:hidden;
    }
    .app{
      width:min(980px, 100%);
      display:grid;
      gap:12px;
      grid-template-columns: 1fr;
    }
    .header{
      background:linear-gradient(180deg, rgba(28,42,61,.95), rgba(18,28,42,.95));
      border:1px solid rgba(216,177,90,.22);
      border-radius:18px;
      padding:12px 14px;
      box-shadow:0 14px 40px var(--shadow);
    }
    .toprow{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size:clamp(26px, 5vw, 40px);
      letter-spacing:.04em;
      color:var(--gold2);
      text-shadow:0 0 18px rgba(216,177,90,.15);
    }
    .subtitle{
      margin-top:4px;
      color:#d8dfeb;
      opacity:.9;
      font-size:14px;
    }
    .stats{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .pill{
      background:rgba(10,16,24,.55);
      border:1px solid rgba(244,234,214,.14);
      color:var(--cream);
      padding:8px 10px;
      border-radius:999px;
      font-size:13px;
      min-width:92px;
      text-align:center;
    }
    .pill strong{color:var(--gold2)}
    .main{
      display:grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap:12px;
      align-items:start;
    }
    .boardWrap, .side{
      background:linear-gradient(180deg, rgba(28,42,61,.95), rgba(18,28,42,.95));
      border:1px solid rgba(216,177,90,.18);
      border-radius:18px;
      box-shadow:0 14px 40px var(--shadow);
      overflow:hidden;
    }
    .boardWrap{padding:12px}
    .board{
      width:100%;
      aspect-ratio:1/1;
      display:grid;
      grid-template-columns:repeat(9,1fr);
      grid-template-rows:repeat(9,1fr);
      border:2px solid rgba(244,234,214,.2);
      border-radius:14px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(10,16,24,.9), rgba(20,30,44,.9));
      touch-action:manipulation;
    }
    .cell{
      position:relative;
      border-right:1px solid rgba(244,234,214,.08);
      border-bottom:1px solid rgba(244,234,214,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(18px, 4.2vw, 28px);
      font-weight:700;
      user-select:none;
      cursor:pointer;
      color:var(--gold2);
      transition:background .12s, transform .12s, box-shadow .12s;
    }
    .cell:nth-child(9n){border-right:none}
    .cell:nth-last-child(-n+9){border-bottom:none}
    .cell.fixed{color:var(--cream)}
    .cell.selected{
      background:rgba(74,163,166,.18);
      box-shadow: inset 0 0 0 2px rgba(74,163,166,.35), 0 0 18px rgba(74,163,166,.18);
      animation:pulse 1.2s infinite ease-in-out;
    }
    .cell.peer{
      background:rgba(216,177,90,.10);
    }
    .cell.same{
      background:rgba(216,177,90,.16);
    }
    .cell.error{
      color:var(--red);
      background:rgba(232,107,107,.10);
    }
    .cell.flash{
      animation:flash .55s ease-out;
    }
    .cell .mark{
      position:absolute;
      right:4px;
      bottom:2px;
      font-size:10px;
      color:rgba(244,234,214,.55);
      font-weight:600;
    }
    .side{
      padding:12px;
      display:grid;
      gap:12px;
    }
    .controls{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(2,1fr);
    }
    button, select{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:14px 12px;
      font-size:16px;
      font-weight:700;
      color:var(--cream);
      background:linear-gradient(180deg, rgba(42,111,115,.95), rgba(25,71,74,.95));
      box-shadow:0 10px 20px rgba(0,0,0,.22);
      cursor:pointer;
      touch-action:manipulation;
    }
    button:active{transform:translateY(1px) scale(.99)}
    button.secondary, select{
      background:linear-gradient(180deg, rgba(34,49,70,.95), rgba(22,33,49,.95));
      border:1px solid rgba(244,234,214,.12);
    }
    button.gold{
      background:linear-gradient(180deg, rgba(216,177,90,.95), rgba(146,108,34,.95));
      color:#1a1407;
    }
    .numPad{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
    }
    .numPad button{
      padding:16px 0;
      border-radius:16px;
      font-size:18px;
      min-height:54px;
    }
    .numPad button.clear{
      grid-column:span 2;
    }
    .message{
      min-height:44px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(10,16,24,.45);
      border:1px solid rgba(244,234,214,.10);
      color:#dfe7f2;
      font-size:14px;
      line-height:1.35;
    }
    .equalizer{
      display:flex;
      gap:4px;
      align-items:end;
      height:34px;
      margin-top:2px;
    }
    .bar{
      width:10px;
      border-radius:999px 999px 0 0;
      background:linear-gradient(180deg, var(--gold2), var(--teal2));
      animation:bars 1s infinite ease-in-out;
      opacity:.9;
    }
    .bar:nth-child(2){animation-delay:.15s}
    .bar:nth-child(3){animation-delay:.3s}
    .bar:nth-child(4){animation-delay:.45s}
    .bar:nth-child(5){animation-delay:.6s}
    .footerNote{
      font-size:12px;
      color:#c8d2e0;
      opacity:.8;
      text-align:center;
      padding-bottom:4px;
    }
    .sparkle{
      position:fixed;
      pointer-events:none;
      font-size:18px;
      animation:spark .9s ease-out forwards;
      filter:drop-shadow(0 0 8px rgba(240,215,140,.45));
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}
    @keyframes flash{0%{transform:scale(.95);background:rgba(216,177,90,.2)}100%{transform:scale(1)}}
    @keyframes bars{0%,100%{height:10px}50%{height:30px}}
    @keyframes spark{
      0%{transform:translateY(0) scale(.8);opacity:0}
      15%{opacity:1}
      100%{transform:translateY(-42px) scale(1.2);opacity:0}
    }
    @media (max-width: 900px){
      .main{grid-template-columns:1fr}
      .controls{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width: 520px){
      .side{padding:10px}
      .numPad{grid-template-columns:repeat(3,1fr)}
      .numPad button.clear{grid-column:span 3}
      .pill{min-width:unset; flex:1}
      .stats{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="toprow">
        <div>
          <h1 id="title">Jazz Grid</h1>
          <div class="subtitle">Fill each row, column, and box with 1–9. Tap a cell, then choose a number.</div>
        </div>
        <div class="stats">
          <div class="pill">Time: <strong id="time">00:00</strong></div>
          <div class="pill">Mistakes: <strong id="mistakes">0</strong></div>
          <div class="pill">Hints: <strong id="hints">0</strong></div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="boardWrap">
        <div id="board" class="board" aria-label="Sudoku board" role="grid"></div>
      </div>

      <div class="side">
        <div class="controls">
          <select id="difficulty" aria-label="Difficulty">
            <option value="easy">Easy Swing</option>
            <option value="medium">Cool Blue</option>
            <option value="hard">Midnight Solo</option>
          </select>
          <button id="newGame" class="gold">New Puzzle</button>
          <button id="undo" class="secondary">Undo</button>
          <button id="hint" class="secondary">Hint</button>
        </div>

        <div class="numPad" id="numPad" aria-label="Number pad"></div>

        <div class="message" id="message">Choose a cell and place a number. Fixed clues are ivory; your notes glow gold.</div>

        <div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <strong style="color:var(--gold2); letter-spacing:.03em;">Jazz Pulse</strong>
            <span style="font-size:12px; opacity:.8;">Visual music cues</span>
          </div>
          <div class="equalizer" aria-hidden="true">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>

        <div class="footerNote">Keyboard: arrows to move, 1–9 to place, Backspace to clear.</div>
      </div>
    </div>
  </div>

  <script>
    // [PP_CONFIG_INJECT]
    const GAME_CONFIG = {
      "theme": { "title": "Jazz Grid", "background": "#0f1722", "player": "#f0d78c", "accent": "#4aa3a6" },
      "moveSpeed": 240,
      "lives": 3,
      "spawnRate": 1.0,
      "assets": { "background_image": null, "player_sprite": null }
    };
    if (typeof window !== 'undefined') { window.GAME_CONFIG = GAME_CONFIG; }
    // [/PP_CONFIG_INJECT]

    const TITLE = (GAME_CONFIG.theme && GAME_CONFIG.theme.title) || 'Jazz Grid';
    const BG = (GAME_CONFIG.theme && GAME_CONFIG.theme.background) || '#0f1722';
    const PLAYER = (GAME_CONFIG.theme && GAME_CONFIG.theme.player) || '#f0d78c';
    const ACCENT = (GAME_CONFIG.theme && GAME_CONFIG.theme.accent) || '#4aa3a6';
    const LIVES = (GAME_CONFIG.lives || 3);

    document.title = TITLE;
    document.getElementById('title').textContent = TITLE;

    const boardEl = document.getElementById('board');
    const timeEl = document.getElementById('time');
    const mistakesEl = document.getElementById('mistakes');
    const hintsEl = document.getElementById('hints');
    const messageEl = document.getElementById('message');
    const diffEl = document.getElementById('difficulty');

    const puzzles = {
      easy: [
        [5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],
        [8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],
        [0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]
      ],
      medium: [
        [0,0,0,2,6,0,7,0,1],[6,8,0,0,7,0,0,9,0],[1,9,0,0,0,4,5,0,0],
        [8,2,0,1,0,0,0,4,0],[0,0,4,6,0,2,9,0,0],[0,5,0,0,0,3,0,2,8],
        [0,0,9,3,0,0,0,7,4],[0,4,0,0,5,0,0,3,6],[7,0,3,0,1,8,0,0,0]
      ],
      hard: [
        [0,0,0,0,0,0,2,0,0],[0,8,0,0,0,7,0,9,0],[6,0,2,0,0,0,5,0,0],
        [0,7,0,0,6,0,0,0,0],[0,0,0,9,0,1,0,0,0],[0,0,0,0,2,0,0,4,0],
        [0,0,5,0,0,0,6,0,3],[0,9,0,4,0,0,0,7,0],[0,0,6,0,0,0,0,0,0]
      ]
    };

    const solutions = {
      easy: [
        [5,3,4,6,7,8,9,1,2],[6,7,2,1,9,5,3,4,8],[1,9,8,3,4,2,5,6,7],
        [8,5,9,7,6,1,4,2,3],[4,2,6,8,5,3,7,9,1],[7,1,3,9,2,4,8,5,6],
        [9,6,1,5,3,7,2,8,4],[2,8,7,4,1,9,6,3,5],[3,4,5,2,8,6,1,7,9]
      ],
      medium: [
        [4,3,5,2,6,9,7,8,1],[6,8,2,5,7,1,4,9,3],[1,9,7,8,3,4,5,6,2],
        [8,2,6,1,9,5,3,4,7],[3,7,4,6,8,2,9,1,5],[9,5,1,7,4,3,6,2,8],
        [5,1,9,3,2,6,8,7,4],[2,4,8,9,5,7,1,3,6],[7,6,3,4,1,8,2,5,9]
      ],
      hard: [
        [9,5,7,6,1,3,2,8,4],[4,8,3,2,5,7,1,9,6],[6,1,2,8,4,9,5,3,7],
        [1,7,8,3,6,4,9,5,2],[5,2,4,9,7,1,3,6,8],[3,6,9,5,2,8,7,4,1],
        [8,4,5,7,9,2,6,1,3],[2,9,1,4,3,6,8,7,5],[7,3,6,1,8,5,4,2,9]
      ]
    };

    let board = [];
    let selected = {r:0,c:0};
    let history = [];
    let mistakes = 0;
    let hints = 0;
    let startTime = Date.now();
    let timer = null;
    let solved = false;

    const bgImg = new Image();
    if (GAME_CONFIG.assets && GAME_CONFIG.assets.background_image) bgImg.src = GAME_CONFIG.assets.background_image;

    function cloneGrid(g){ return g.map(row => row.slice()); }
    function formatTime(ms){
      const s = Math.floor(ms/1000), m = Math.floor(s/60);
      return String(m).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }
    function setMsg(t){ messageEl.textContent = t; }

    function startGame(){
      const d = diffEl.value;
      board = puzzles[d].map((row,r)=>row.map((v,c)=>({
        value:v,
        fixed:v!==0,
        error:false,
        flash:false
      })));
      selected = {r:0,c:0};
      history = [];
      mistakes = 0;
      hints = 0;
      solved = false;
      startTime = Date.now();
      mistakesEl.textContent = mistakes;
      hintsEl.textContent = hints;
      setMsg('Smooth start. Tap a cell and place a number with the pad or keyboard.');
      render();
      clearInterval(timer);
      timer = setInterval(()=>{ if(!solved) timeEl.textContent = formatTime(Date.now()-startTime); }, 250);
    }

    function render(){
      boardEl.innerHTML = '';
      for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
          const cell = document.createElement('div');
          const d = board[r][c];
          cell.className = 'cell' + (d.fixed ? ' fixed' : '') + (selected.r===r && selected.c===c ? ' selected' : '');
          if (d.error) cell.classList.add('error');
          if (d.flash) cell.classList.add('flash');
          const val = d.value ? d.value : '';
          cell.textContent = val;
          if (selected.r===r || selected.c===c || (Math.floor(selected.r/3)===Math.floor(r/3) && Math.floor(selected.c/3)===Math.floor(c/3))) {
            cell.classList.add('peer');
          }
          if (selected.r===r && selected.c===c) cell.classList.add('same');
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener('click', ()=>{ selected = {r,c}; render(); });
          cell.addEventListener('touchstart', ()=>{ selected = {r,c}; render(); }, {passive:true});
          boardEl.appendChild(cell);
        }
      }
      checkSolved();
    }

    function isValid(r,c,n){
      for(let i=0;i<9;i++) if(board[r][i].value===n || board[i][c].value===n) return false;
      const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
      for(let rr=br; rr<br+3; rr++) for(let cc=bc; cc<bc+3; cc++) if(board[rr][cc].value===n) return false;
      return true;
    }

    function place(n){
      if(solved) return;
      const cell = board[selected.r][selected.c];
      if(cell.fixed) return setMsg('That clue is locked in. Try a different square.');
      history.push({grid: cloneGrid(board), mistakes, hints, time: Date.now()-startTime});
      if(n===0){
        cell.value = 0; cell.error = false; render(); return;
      }
      const correct = solutions[diffEl.value][selected.r][selected.c] === n;
      cell.value = n;
      cell.error = !correct;
      if(correct){
        cell.flash = true;
        sparkleAt(selected.r, selected.c);
        setMsg('Nice! That note fits the chord.');
      }else{
        mistakes++;
        mistakesEl.textContent = mistakes;
        setMsg('Oops — that note clashes a little. Try again.');
      }
      setTimeout(()=>{ cell.flash = false; render(); }, 220);
      render();
    }

    function sparkleAt(r,c){
      const rect = boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`).getBoundingClientRect();
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = ['♪','♩','✦'][Math.floor(Math.random()*3)];
      s.style.left = (rect.left + rect.width/2 - 8 + (Math.random()*18-9)) + 'px';
      s.style.top = (rect.top + rect.height/2 - 8) + 'px';
      s.style.color = Math.random()>.5 ? PLAYER : ACCENT;
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 900);
    }

    function hint(){
      if(solved) return;
      const empties = [];
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(!board[r][c].fixed && !board[r][c].value) empties.push({r,c});
      if(!empties.length) return;
      const pick = empties[Math.floor(Math.random()*empties.length)];
      selected = pick;
      hints++;
      hintsEl.textContent = hints;
      place(solutions[diffEl.value][pick.r][pick.c]);
      setMsg('A gentle hint landed on the board.');
    }

    function undo(){
      const prev = history.pop();
      if(!prev) return;
      board = prev.grid;
      mistakes = prev.mistakes;
      hints = prev.hints;
      startTime = Date.now() - prev.time;
      mistakesEl.textContent = mistakes;
      hintsEl.textContent = hints;
      setMsg('Undid the last move.');
      render();
    }

    function checkSolved(){
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(!board[r][c].value || board[r][c].value !== solutions[diffEl.value][r][c]) return false;
      if(!solved){
        solved = true;
        setMsg(`Puzzle solved! Time ${timeEl.textContent}, mistakes ${mistakes}, hints ${hints}. Great jam session!`);
        boardEl.querySelectorAll('.cell').forEach((el,i)=>setTimeout(()=>el.classList.add('flash'), i*10));
      }
      return true;
    }

    document.getElementById('newGame').addEventListener('click', startGame);
    document.getElementById('undo').addEventListener('click', undo);
    document.getElementById('hint').addEventListener('click', hint);
    diffEl.addEventListener('change', startGame);

    document.getElementById('numPad').innerHTML = `
      <button data-n="1">1</button><button data-n="2">2</button><button data-n="3">3</button>
      <button data-n="4">4</button><button data-n="5">5</button><button data-n="6">6</button>
      <button data-n="7">7</button><button data-n="8">8</button><button data-n="9">9</button>
      <button data-n="0" class="clear secondary">Clear</button>
    `;
    document.getElementById('numPad').addEventListener('click', (e)=>{
      const b = e.target.closest('button');
      if(!b) return;
      place(parseInt(b.dataset.n,10));
    });

    window.addEventListener('keydown', (e)=>{
      const k = e.key;
      if(k==='ArrowUp') selected.r = (selected.r+8)%9;
      else if(k==='ArrowDown') selected.r = (selected.r+1)%9;
      else if(k==='ArrowLeft') selected.c = (selected.c+8)%9;
      else if(k==='ArrowRight') selected.c = (selected.c+1)%9;
      else if(/^[1-9]$/.test(k)) place(parseInt(k,10));
      else if(k==='Backspace' || k==='Delete' || k==='0') place(0);
      else if(k==='h' || k==='H') hint();
      else if((k==='z' || k==='Z') && (e.ctrlKey || e.metaKey)) undo();
      else return;
      e.preventDefault();
      render();
    }, {passive:false});

    startGame();
  </script>

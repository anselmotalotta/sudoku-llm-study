<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bebop Board: The Jazz Sudoku</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1a1a1a;
            --accent-mustard: #e9c46a;
            --accent-orange: #f4a261;
            --accent-teal: #2a9d8f;
            --text-light: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 10px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--accent-mustard);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #canvas-wrapper {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid var(--accent-teal);
            border-radius: 8px;
            background: #000;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #controls {
            margin-top: 20px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .num-btn {
            background: var(--panel-color);
            border: 2px solid var(--accent-orange);
            color: var(--accent-mustard);
            font-size: 1.4rem;
            padding: 12px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .num-btn:active, .num-btn.selected {
            background: var(--accent-orange);
            color: var(--bg-color);
            transform: scale(0.95);
        }

        .num-btn.clear {
            grid-column: span 1;
            font-size: 0.9rem;
            color: var(--accent-teal);
            border-color: var(--accent-teal);
        }

        #status-bar {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--accent-orange);
            height: 20px;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--panel-color);
            padding: 30px;
            border-radius: 12px;
            border: 3px solid var(--accent-mustard);
            text-align: center;
        }

        button.main-btn {
            background: var(--accent-teal);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <h1 id="game-title">Bebop Board</h1>
        <div id="status-bar">Select a cell to start riffing...</div>
    </header>

    <div id="canvas-wrapper">
        <canvas id="sudokuCanvas"></canvas>
    </div>

    <div id="controls">
        <button class="num-btn" data-val="1">1</button>
        <button class="num-btn" data-val="2">2</button>
        <button class="num-btn" data-val="3">3</button>
        <button class="num-btn" data-val="4">4</button>
        <button class="num-btn" data-val="5">5</button>
        <button class="num-btn" data-val="6">6</button>
        <button class="num-btn" data-val="7">7</button>
        <button class="num-btn" data-val="8">8</button>
        <button class="num-btn" data-val="9">9</button>
        <button class="num-btn clear" data-val="0">CLR</button>
    </div>
</div>

<div id="winModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--accent-mustard)">Smooth Jazz!</h2>
        <p>You solved the Bebop Board.</p>
        <button class="main-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
// [PP_CONFIG_INJECT]
const GAME_CONFIG = {
  "theme": { 
    "title": "Bebop Board: The Jazz Sudoku", 
    "background": "#121212", 
    "grid": "#2a9d8f", 
    "number": "#e9c46a",
    "highlight": "#f4a261" 
  },
  "difficulty": 35, // Number of cells to reveal (lower is harder)
  "showErrors": true,
  "assets": { 
    "background_image": null 
  }
};
if (typeof window !== 'undefined') { window.GAME_CONFIG = GAME_CONFIG; }
// [/PP_CONFIG_INJECT]

const CANVAS = document.getElementById('sudokuCanvas');
const CTX = CANVAS.getContext('2d');
const TITLE_EL = document.getElementById('game-title');
const STATUS_EL = document.getElementById('status-bar');
const WIN_MODAL = document.getElementById('winModal');

// Load Config
const TITLE = GAME_CONFIG.theme.title || "Bebop Board";
const BG_COLOR = GAME_CONFIG.theme.background || "#121212";
const GRID_COLOR = GAME_CONFIG.theme.grid || "#2a9d8f";
const NUM_COLOR = GAME_CONFIG.theme.number || "#e9c46a";
const HIGHLIGHT_COLOR = GAME_CONFIG.theme.highlight || "#f4a261";
const DIFFICULTY = GAME_CONFIG.difficulty || 35;

TITLE_EL.textContent = TITLE;
document.title = TITLE;

// Asset Loading
const bgImg = new Image();
if (GAME_CONFIG.assets && GAME_CONFIG.assets.background_image) {
    bgImg.src = GAME_CONFIG.assets.background_image;
}

// Game State
let grid = []; // Current state
let solution = []; // Full solution
let initial = []; // Boolean mask of initial numbers
let selectedCell = { r: -1, c: -1 };
let cellSize = 0;

// Initialize Sudoku
function initSudoku() {
    // Generate empty 9x9
    grid = Array.from({ length: 9 }, () => Array(9).fill(0));
    solveSudoku(grid); // Fill it completely
    solution = grid.map(row => [...row]);
    
    // Poke holes
    let cellsToRemove = 81 - DIFFICULTY;
    initial = Array.from({ length: 9 }, () => Array(9).fill(true));
    
    while (cellsToRemove > 0) {
        let r = Math.floor(Math.random() * 9);
        let c = Math.floor(Math.random() * 9);
        if (grid[r][c] !== 0) {
            grid[r][c] = 0;
            initial[r][c] = false;
            cellsToRemove--;
        }
    }
}

// Simple Backtracking Solver for Generation
function solveSudoku(board) {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            if (board[r][c] === 0) {
                let nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                for (let n of nums) {
                    if (isValid(board, r, c, n)) {
                        board[r][c] = n;
                        if (solveSudoku(board)) return true;
                        board[r][c] = 0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

function isValid(board, r, c, n) {
    for (let i = 0; i < 9; i++) {
        if (board[r][i] === n || board[i][c] === n) return false;
    }
    let startR = Math.floor(r / 3) * 3;
    let startC = Math.floor(c / 3) * 3;
    for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
            if (board[startR + i][startC + j] === n) return false;
        }
    }
    return true;
}

// Rendering Logic
function resizeCanvas() {
    const size = Math.min(window.innerWidth - 40, 450);
    CANVAS.width = size;
    CANVAS.height = size;
    cellSize = size / 9;
    draw();
}

function draw() {
    CTX.clearRect(0, 0, CANVAS.width, CANVAS.height);

    // Background
    if (bgImg.complete && bgImg.naturalWidth) {
        CTX.globalAlpha = 0.3;
        CTX.drawImage(bgImg, 0, 0, CANVAS.width, CANVAS.height);
        CTX.globalAlpha = 1.0;
    } else {
        CTX.fillStyle = BG_COLOR;
        CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);
    }

    // Highlight selected cell and related area
    if (selectedCell.r !== -1) {
        // Highlight row and column
        CTX.fillStyle = 'rgba(255, 255, 255, 0.05)';
        CTX.fillRect(0, selectedCell.r * cellSize, CANVAS.width, cellSize);
        CTX.fillRect(selectedCell.c * cellSize, 0, cellSize, CANVAS.height);
        
        // Highlight specific cell
        CTX.fillStyle = HIGHLIGHT_COLOR + "44"; // Adding alpha
        CTX.fillRect(selectedCell.c * cellSize, selectedCell.r * cellSize, cellSize, cellSize);
    }

    // Draw Grid Lines
    CTX.strokeStyle = GRID_COLOR;
    for (let i = 0; i <= 9; i++) {
        CTX.lineWidth = (i % 3 === 0) ? 4 : 1;
        // Verticals
        CTX.beginPath();
        CTX.moveTo(i * cellSize, 0);
        CTX.lineTo(i * cellSize, CANVAS.height);
        CTX.stroke();
        // Horizontals
        CTX.beginPath();
        CTX.moveTo(0, i * cellSize);
        CTX.lineTo(CANVAS.width, i * cellSize);
        CTX.stroke();
    }

    // Draw Numbers
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.font = `bold ${cellSize * 0.6}px "Courier New", Courier, monospace`;

    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            let val = grid[r][c];
            if (val !== 0) {
                if (initial[r][c]) {
                    CTX.fillStyle = NUM_COLOR; // Fixed original numbers
                } else {
                    // Check if player's entry is correct
                    if (GAME_CONFIG.showErrors && val !== solution[r][c]) {
                        CTX.fillStyle = "#e76f51"; // Error color
                    } else {
                        CTX.fillStyle = "#ffffff"; // Player's valid entry
                    }
                }
                CTX.fillText(val, c * cellSize + cellSize / 2, r * cellSize + cellSize / 2 + 2);
            }
        }
    }
}

// Input Handling
function handleCanvasClick(e) {
    const rect = CANVAS.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;
    
    selectedCell.c = Math.floor(x / cellSize);
    selectedCell.r = Math.floor(y / cellSize);
    
    STATUS_EL.textContent = initial[selectedCell.r][selectedCell.c] 
        ? "That's a standard riff (fixed)." 
        : "Lay down a note...";
    
    draw();
}

function handleInput(val) {
    if (selectedCell.r === -1) return;
    if (initial[selectedCell.r][selectedCell.c]) return;

    grid[selectedCell.r][selectedCell.c] = val;
    draw();
    checkWin();
}

function checkWin() {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            if (grid[r][c] !== solution[r][c]) return;
        }
    }
    WIN_MODAL.classList.add('active');
}

// Event Listeners
window.addEventListener('resize', resizeCanvas);
CANVAS.addEventListener('mousedown', handleCanvasClick);
CANVAS.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleCanvasClick(e);
}, {passive: false});

document.querySelectorAll('.num-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const val = parseInt(btn.getAttribute('data-val'));
        handleInput(val);
        
        // Visual feedback for buttons
        btn.classList.add('selected');
        setTimeout(() => btn.classList.remove('selected'), 150);
    });
});

window.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '9') {
        handleInput(parseInt(e.key));
    } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
        handleInput(0);
    } else if (e.key.startsWith('Arrow')) {
        if (selectedCell.r === -1) { selectedCell.r = 0; selectedCell.c = 0; }
        else {
            if (e.key === 'ArrowUp') selectedCell.r = Math.max(0, selectedCell.r - 1);
            if (e.key === 'ArrowDown') selectedCell.r = Math.min(8, selectedCell.r + 1);
            if (e.key === 'ArrowLeft') selectedCell.c = Math.max(0, selectedCell.c - 1);
            if (e.key === 'ArrowRight') selectedCell.c = Math.min(8, selectedCell.c + 1);
        }
        draw();
    }
});

// Start Game
initSudoku();
resizeCanvas();

</script>
